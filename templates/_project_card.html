<article
    class="project-card{% if project.play_endpoint %} project-card-playable{% endif %}"
    {% if project.play_endpoint %}
        onclick="if (!event.target.closest('a')) window.location.href='{{ url_for(project.play_endpoint) }}'"
        title="Click to play {{ project.title }}"
    {% endif %}>
    <div class="project-preview project-preview-{{ project.slug }}{% if project.preview_image %} has-image{% endif %}" aria-hidden="true">
        {% if project.preview_image %}
            <img src="{{ url_for('static', filename=project.preview_image) }}" alt="">
        {% else %}
            <span></span>
            <span></span>
            <span></span>
        {% endif %}
    </div>
    <div>
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
    </div>
    <div class="project-links">
        {% if project.play_endpoint %}
            <a href="{{ url_for(project.play_endpoint) }}">Play</a>
        {% endif %}
        <a href="{{ url_for('static', filename=project.download_filename) }}" download>Download</a>
    </div>
</article>
